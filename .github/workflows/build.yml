name: Build and Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore FloatHearing.slnx

      - name: Publish application (x64)
        run: >
          dotnet publish FloatHearing.csproj `
            -c Release `
            -f net10.0-windows10.0.26100.0 `
            -r win-x64 `
            -p:Platform=x64 `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build installer with Inno Setup
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" FloatHearing.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatHearing_Setup_x64
          path: installer/FloatHearing_Setup.exe
          if-no-files-found: error

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatHearing_Portable_x64
          path: bin/x64/Release/net10.0-windows10.0.26100.0/win-x64/publish/**/**
          if-no-files-found: error
